spring:
  datasource:
    url: jdbc:mysql://localhost:3306/chaseflow_crm
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  jwt:
    secret: ${JWT_SECRET:default-secret-key-change-in-production-must-be-at-least-256-bits-long-for-hs256}
    expiration-ms: 86400000
  aws:
    region: eu-west-2
    s3-bucket: ${S3_BUCKET:chaseflow-files}
    ses:
      from-email: ${SES_FROM_EMAIL:noreply@chaseflow.com}
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    model: claude-sonnet-4-20250514
  twilio:
    account-sid: ${TWILIO_ACCOUNT_SID:}
    auth-token: ${TWILIO_AUTH_TOKEN:}
    from-sms: ${TWILIO_FROM_SMS:}
    from-whatsapp: ${TWILIO_FROM_WHATSAPP:}
